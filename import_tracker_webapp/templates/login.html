<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Login - Adobea Import Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f1117;
    color: #e8eaf6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: #1a1d27;
    border: 1px solid #2e3250;
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; font-size: 42px; margin-bottom: 8px; }
  h1 { text-align: center; font-size: 20px; margin-bottom: 4px; }
  p.sub { text-align: center; font-size: 13px; color: #8b90b4; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 11px; color: #8b90b4; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: #22263a;
    border: 1.5px solid #2e3250;
    border-radius: 8px;
    color: #e8eaf6;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #6c63ff; }
  .btn {
    width: 100%;
    padding: 12px;
    background: #6c63ff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .error {
    background: rgba(255,77,109,0.15);
    border: 1px solid #ff4d6d;
    color: #ff4d6d;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo">📦</div>
    <h1>Adobea Import Tracker</h1>
    <p class="sub">Please log in to continue</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autofocus required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn">🔓 Log In</button>
    </form>
  </div>
</body>
</html>
